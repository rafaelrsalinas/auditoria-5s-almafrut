<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoría 5S — Almafrut</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <div id="formView">
        <header class="bg-blue-700 text-white p-4 sticky top-0 z-10">
            <h1 class="text-lg font-bold text-center">Auditoría 5S</h1>
        </header>

        <form id="auditForm" class="max-w-2xl mx-auto p-4 space-y-6 pb-8">

            <section class="bg-white rounded-lg shadow p-4 space-y-4">
                <h2 class="font-bold text-blue-700 text-lg">Datos de la Auditoría</h2>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Fecha</label>
                    <input type="date" id="fecha" class="w-full border rounded-lg p-2" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Trimestre</label>
                    <input type="text" id="trimestre" class="w-full border rounded-lg p-2 bg-gray-100" readonly>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Auditor</label>
                    <input type="text" id="auditor" class="w-full border rounded-lg p-2" placeholder="Nombre y apellidos" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Zona</label>
                    <select id="zona" class="w-full border rounded-lg p-2" required>
                        <option value="">Selecciona zona...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Responsable de área</label>
                    <input type="text" id="responsable" class="w-full border rounded-lg p-2 bg-gray-100" readonly>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Empresa</label>
                    <input type="text" id="empresa" class="w-full border rounded-lg p-2 bg-gray-100" readonly>
                </div>
            </section>

            <div id="subzonasContainer"></div>

            <div id="resumenContainer" class="hidden">
                <section class="bg-white rounded-lg shadow p-4 space-y-3">
                    <h2 class="font-bold text-blue-700 text-lg">Resumen</h2>
                    <div class="grid grid-cols-4 gap-2 text-center text-sm">
                        <div class="bg-blue-50 rounded p-2">
                            <div class="text-gray-500">E</div>
                            <div class="font-bold" id="subtotalE">0</div>
                        </div>
                        <div class="bg-blue-50 rounded p-2">
                            <div class="text-gray-500">O</div>
                            <div class="font-bold" id="subtotalO">0</div>
                        </div>
                        <div class="bg-blue-50 rounded p-2">
                            <div class="text-gray-500">L</div>
                            <div class="font-bold" id="subtotalL">0</div>
                        </div>
                        <div class="bg-blue-50 rounded p-2">
                            <div class="text-gray-500">S</div>
                            <div class="font-bold" id="subtotalS">0</div>
                        </div>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-2xl font-bold" id="totalPuntos">0 / 0</span>
                        <span class="text-2xl font-bold" id="porcentaje">0%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-4">
                        <div id="barraProgreso" class="h-4 rounded-full bg-red-500 transition-all duration-300" style="width:0%"></div>
                    </div>
                </section>
            </div>

            <section class="bg-white rounded-lg shadow p-4 space-y-4">
                <div class="flex items-center justify-between">
                    <h2 class="font-bold text-blue-700 text-lg">Acciones Correctivas</h2>
                    <button type="button" id="btnAddAccion" class="bg-blue-600 text-white text-sm px-3 py-1 rounded-lg">+ Añadir</button>
                </div>
                <div id="accionesContainer" class="space-y-4"></div>
                <p id="noAcciones" class="text-gray-400 text-sm text-center">Sin acciones correctivas</p>
            </section>

            <section class="bg-white rounded-lg shadow p-4">
                <h2 class="font-bold text-blue-700 text-lg mb-2">Observaciones</h2>
                <textarea id="observaciones" class="w-full border rounded-lg p-2" rows="3" placeholder="Observaciones generales (opcional)"></textarea>
            </section>

            <button type="submit" id="btnEnviar" class="w-full bg-blue-700 text-white font-bold py-3 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                Enviar Auditoría
            </button>
        </form>
    </div>

    <div id="sendingView" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 text-center space-y-4 mx-4">
            <div class="animate-spin h-10 w-10 border-4 border-blue-700 border-t-transparent rounded-full mx-auto"></div>
            <p class="text-lg font-medium">Enviando auditoría...</p>
        </div>
    </div>

    <div id="successView" class="hidden min-h-screen bg-gray-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-lg p-8 text-center space-y-4 max-w-md w-full">
            <div class="text-green-500 text-5xl">&#10003;</div>
            <h2 class="text-xl font-bold text-green-700">Auditoría enviada correctamente</h2>
            <div id="successDetails" class="text-gray-600 text-sm space-y-1"></div>
            <button type="button" onclick="location.reload()" class="bg-blue-700 text-white font-bold py-3 px-6 rounded-lg mt-4">
                Nueva auditoría
            </button>
        </div>
    </div>

    <div id="errorView" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg p-8 text-center space-y-4 max-w-sm w-full">
            <div class="text-red-500 text-5xl">&#10007;</div>
            <h2 class="text-xl font-bold text-red-700">Error al enviar</h2>
            <p class="text-gray-600 text-sm">Comprueba tu conexión e inténtalo de nuevo.</p>
            <button type="button" id="btnReintentar" class="w-full bg-red-600 text-white font-bold py-3 rounded-lg">Reintentar</button>
            <button type="button" id="btnVolverForm" class="w-full text-gray-500 py-2 text-sm">Volver al formulario</button>
        </div>
    </div>

<script>
const CONFIG = { endpoint: "[PENDIENTE]" };

const ZONAS = [
  {
    zona: "Nave de cartón", responsable: "Juan Baena", empresa: "ALMAFRUT",
    subzonas: ["Zonas Exteriores","Puertas y Muelles de Carga/Descarga","Pasillos de Circulación","Almacén de Planchas","Almacenaje Pallets","Máquina Montaje nº 1","Máquina Montaje nº 2","Máquina Montaje nº 3","Máquina Montaje nº 4","Máquina Montaje nº 5","Máquina Montaje nº 6","Almacén de Recambios, Herramientas y Otros","Oficina","Zona de Cola y Bigbags Plástico","Zona de Reparación Pallets","Pizarra 5S"]
  },
  {
    zona: "Almacén envase y embalaje", responsable: "Alberto Rodríguez", empresa: "ALMAFRUT",
    subzonas: ["Zona de Devoluciones y Materiales Obsoletos","Zona de Almacenaje Nave 2","Zona Carga Carretillas Eléctricas","Zona de Almacenaje Nave 1","Zona Gasoil","Zona Recepción-Expedición","Muelles y Zonas Exteriores","Oficina","Zona Almacén Productos Limpieza","Estanterías de Almacenaje","Pizarra 5S"]
  },
  {
    zona: "Oficina Almafrut", responsable: "Enrique Rodríguez", empresa: "ALMAFRUT",
    subzonas: ["Cuarto del Servidor","Despacho Emilio","Despacho Manolo Andújar","Despacho Enrique Padre e Hijo","Despacho Alberto y Nicolás","Despacho Alejandro, Trujillo, Baena y Rafa","Despacho Blas y Juan Basoa","Despacho Toni","Sala de Juntas","Sala de Formación","Cocina","Pasillos y Zonas Comunes","Pizarra 5S"]
  },
  {
    zona: "Almacén recambios CERYS", responsable: "Sergio Doucet", empresa: "CERYS",
    subzonas: ["Almacén Planta Baja (100)","Almacén Planta Alta (200)","Almacén de Tornillería y Electricidad","Almacén Laboratorio","Almacén Varios Lavadero","Almacén Ruedas y Baterías","Almacén Material \"Preparado para...\"","Almacén Material Puertas Nave Arriba","Pizarra 5S"]
  },
  {
    zona: "Taller CERYS", responsable: "Ramón Mirón", empresa: "CERYS",
    subzonas: ["Zona de Carga Baterías","Zona de Prensa","Zona de Pinturas","Zona de Torno","Zona de Soldadura","Lavadero","Zona de Mástiles y Fregadoras","Zonas Expedición y Recepción","Paneles Herramientas","Servicios y Vestuarios","Zonas Parking Máquinas Taller","Zona Herramientas y Documentación Técnica","Explanada Exterior y Pintura (Común con INGRO)","Zona Máquinas Venta Nueva y Usada (Nave Arriba)","Zona Máquinas Alquiler (Nave Arriba)","Oficina","Pizarra 5S"]
  },
  {

    subzonas: ["4300-FVR (Pulpi)","6444-NDN (Dionisio)","0979-HTS (Ángel Carrillo)","0599-JCR (Rafael)","8754-JKB (Javi Trujillo)","1441-JWG (Alexis)","8495-JWS (Ocaña)","8127-JXK (Álvaro)","1628-KLV (Paco Martín)","0869-KSX (Raúl Adolf.)","0991-KTX (José Manuel)","0568-KWB (Dionisio Antigua)","9133-LGH (Raúl Alo.)","9136-LGH (Santos)","9229-LKJ (Juan Luis Fer.)","0130-LMG (Juanjo)","2843-LVY (Juan Miguel)","8876-MPN (José Luis)","9825-MPN (Julio Lara)"]
  },
  {
    zona: "Boxes CERYS", responsable: "Sergio Bueno", empresa: "CERYS",
    subzonas: ["Box nº 1 (Diesel)","Box nº 2 (Diesel)","Box nº 3 (Eléctrico)","Box nº 4 (Eléctrico)","Box nº 5 (Eléctrico)","Box nº 6 (Eléctrico)","Box nº 7 (Eléctrico)","Box nº 8 (Eléctrico)","Box nº 9","Box nº 10 - Flejadoras (Nave Arriba)","Box nº 11 - Envasadoras (Nave Arriba)","Box nº 12 - Etiquetadoras (Nave Arriba)","Pizarra 5S"]
  },
  {
    zona: "Oficinas INGRO", responsable: "Javier López", empresa: "INGRO",
    subzonas: ["Oficina Recepción","Oficina Jefe Taller","Oficina Administración","Oficina Técnica","Sala de Juntas","Servicios y Zonas Comunes Oficina","Comedor","Aseos","Pizarra 5S"]
  },
  {
    zona: "Taller INGRO", responsable: "Carlos Moya", empresa: "INGRO",
    subzonas: ["Zona Recepción y Expedición","Zona de Almacenaje y Corte de Tubos, Macizos y Perfiles","Zona de Tornos y Fresas","Taller Eléctrico","Zona Pintura y Patio Trasero (Común con CERYS)","Zona de Almacenaje y Corte de Chapa","Zona de Producción","Zonas Comunes","Pizarra 5S"]
  },
  {
    zona: "Almacén recambios INGRO", responsable: "David", empresa: "INGRO",
    subzonas: ["Almacén E-1","Almacén E-2 y E-3","Almacén E-4 y E-5","Almacén E-6 y E-7","Almacén E-8 y E-9","Almacén E-10 y E-11","Almacén E-12 y E-13","Almacén E-14 A-B","Almacén E-15","Almacén E-16 y E-17","Almacén E-18","Almacén E-19","Almacén E-20","Almacén E-21 y E-22","Zona P-01","Zona Recepción y Expedición","Oficina y Zonas Comunes","Almacén E-24","Pizarra 5S"]
  }
];

let accionCount = 0;
let lastPayload = null;
let selectedZonaIndex = null;

function init() {
    initFecha();
    initZonas();
    document.getElementById("btnAddAccion").addEventListener("click", addAccion);
    document.getElementById("auditForm").addEventListener("submit", handleSubmit);
    document.getElementById("btnReintentar").addEventListener("click", retrySend);
    document.getElementById("btnVolverForm").addEventListener("click", () => setState("form"));
    document.getElementById("auditor").addEventListener("input", validateForm);
}

function initFecha() {
    const el = document.getElementById("fecha");
    el.value = new Date().toISOString().split("T")[0];
    updateTrimestre(el.value);
    el.addEventListener("change", (e) => updateTrimestre(e.target.value));
}

function updateTrimestre(dateStr) {
    const d = new Date(dateStr);
    const q = Math.floor(d.getMonth() / 3) + 1;
    document.getElementById("trimestre").value = "Q" + q + "-" + d.getFullYear();
}

function initZonas() {
    const sel = document.getElementById("zona");
    ZONAS.forEach((z, i) => {
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = z.zona;
        sel.appendChild(opt);
    });
    sel.addEventListener("change", () => {
        if (sel.value === "") {
            document.getElementById("responsable").value = "";
            document.getElementById("empresa").value = "";
            selectedZonaIndex = null;
            document.getElementById("subzonasContainer").innerHTML = "";
            document.getElementById("resumenContainer").classList.add("hidden");
        } else {
            selectedZonaIndex = parseInt(sel.value);
            const z = ZONAS[selectedZonaIndex];
            document.getElementById("responsable").value = z.responsable;
            document.getElementById("empresa").value = z.empresa;
            renderSubzonas(z.subzonas);
            document.getElementById("resumenContainer").classList.remove("hidden");
            updateAccionesSubzonaSelects();
        }
        updateScores();
        validateForm();
    });
}

function renderSubzonas(subzonas) {
    const container = document.getElementById("subzonasContainer");
    const section = document.createElement("section");
    section.className = "bg-white rounded-lg shadow p-4 space-y-1";
    section.innerHTML = '<h2 class="font-bold text-blue-700 text-lg mb-3">Sub-zonas (' + subzonas.length + ')</h2>';

    const table = document.createElement("div");
    table.className = "space-y-3";

    subzonas.forEach((nombre, i) => {
        const idx = i + 1;
        const row = document.createElement("div");
        row.className = "border rounded-lg p-3 space-y-2";
        row.innerHTML =
            '<div class="font-medium text-sm text-gray-800">' + idx + '. ' + escapeHtml(nombre) + '</div>' +
            '<div class="grid grid-cols-4 gap-2">' +
                buildSelect("z" + idx + "_e", "E") +
                buildSelect("z" + idx + "_o", "O") +
                buildSelect("z" + idx + "_l", "L") +
                buildSelect("z" + idx + "_s", "S") +
            '</div>' +
            '<input type="text" class="w-full border rounded p-1.5 text-sm sz-obs" data-idx="' + idx + '" placeholder="Observación (opcional)">';
        table.appendChild(row);
    });

    section.appendChild(table);
    container.innerHTML = "";
    container.appendChild(section);

    container.addEventListener("change", () => {
        updateScores();
        validateForm();
    });
}

function buildSelect(id, label) {
    return '<div>' +
        '<label class="block text-xs text-gray-500 text-center mb-1">' + label + '</label>' +
        '<select id="' + id + '" class="w-full border rounded p-1.5 text-sm text-center sz-score">' +
            '<option value="">-</option>' +
            '<option value="0">0</option>' +
            '<option value="1">1</option>' +
            '<option value="2">2</option>' +
            '<option value="3">3</option>' +
        '</select>' +
    '</div>';
}

function escapeHtml(str) {
    const d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
}

function updateScores() {
    if (selectedZonaIndex === null) return;
    const n = ZONAS[selectedZonaIndex].subzonas.length;
    let totE = 0, totO = 0, totL = 0, totS = 0;

    for (let i = 1; i <= n; i++) {
        const e = getVal("z" + i + "_e");
        const o = getVal("z" + i + "_o");
        const l = getVal("z" + i + "_l");
        const s = getVal("z" + i + "_s");
        totE += e;
        totO += o;
        totL += l;
        totS += s;
    }

    document.getElementById("subtotalE").textContent = totE;
    document.getElementById("subtotalO").textContent = totO;
    document.getElementById("subtotalL").textContent = totL;
    document.getElementById("subtotalS").textContent = totS;

    const total = totE + totO + totL + totS;
    const max = n * 12;
    const pct = max > 0 ? Math.round((total / max) * 1000) / 10 : 0;

    document.getElementById("totalPuntos").textContent = total + " / " + max;
    document.getElementById("porcentaje").textContent = pct + "%";

    const barra = document.getElementById("barraProgreso");
    barra.style.width = pct + "%";
    if (pct < 50) barra.className = "h-4 rounded-full bg-red-500 transition-all duration-300";
    else if (pct < 80) barra.className = "h-4 rounded-full bg-yellow-400 transition-all duration-300";
    else barra.className = "h-4 rounded-full bg-green-500 transition-all duration-300";
}

function getVal(id) {
    const el = document.getElementById(id);
    return el && el.value !== "" ? parseInt(el.value) : 0;
}

function addAccion() {
    if (accionCount >= 5) return;
    accionCount++;
    document.getElementById("noAcciones").classList.add("hidden");

    const subzonaOptions = buildSubzonaOptions();
    const container = document.getElementById("accionesContainer");
    const div = document.createElement("div");
    div.className = "border rounded-lg p-3 space-y-3 accion-block";
    div.innerHTML =
        '<div class="flex items-center justify-between">' +
            '<span class="font-medium text-sm accion-label">Acción ' + accionCount + '</span>' +
            '<button type="button" class="text-red-500 text-sm btn-remove">Eliminar</button>' +
        '</div>' +
        '<div>' +
            '<label class="block text-sm text-gray-600 mb-1">Descripción</label>' +
            '<input type="text" class="w-full border rounded-lg p-2 accion-desc" placeholder="Descripción de la acción">' +
        '</div>' +
        '<div class="grid grid-cols-2 gap-3">' +
            '<div>' +
                '<label class="block text-sm text-gray-600 mb-1">Sub-zona afectada</label>' +
                '<select class="w-full border rounded-lg p-2 accion-subzona">' + subzonaOptions + '</select>' +
            '</div>' +
            '<div>' +
                '<label class="block text-sm text-gray-600 mb-1">S afectada</label>' +
                '<select class="w-full border rounded-lg p-2 accion-s">' +
                    '<option value="E">E — Eliminar</option>' +
                    '<option value="O">O — Ordenar</option>' +
                    '<option value="L">L — Limpiar</option>' +
                    '<option value="S">S — Estandarizar</option>' +
                '</select>' +
            '</div>' +
        '</div>' +
        '<div class="grid grid-cols-2 gap-3">' +
            '<div>' +
                '<label class="block text-sm text-gray-600 mb-1">Responsable</label>' +
                '<input type="text" class="w-full border rounded-lg p-2 accion-resp" placeholder="Nombre">' +
            '</div>' +
            '<div>' +
                '<label class="block text-sm text-gray-600 mb-1">Fecha compromiso</label>' +
                '<input type="date" class="w-full border rounded-lg p-2 accion-fecha">' +
            '</div>' +
        '</div>';

    container.appendChild(div);

    div.querySelector(".btn-remove").addEventListener("click", () => {
        div.remove();
        accionCount--;
        renumberAcciones();
        if (accionCount === 0) document.getElementById("noAcciones").classList.remove("hidden");
        if (accionCount < 5) document.getElementById("btnAddAccion").disabled = false;
        validateForm();
    });

    div.querySelectorAll("input, select").forEach(el => el.addEventListener("input", validateForm));

    if (accionCount >= 5) document.getElementById("btnAddAccion").disabled = true;
    validateForm();
}

function buildSubzonaOptions() {
    if (selectedZonaIndex === null) return '<option value="">Selecciona zona primero</option>';
    const subzonas = ZONAS[selectedZonaIndex].subzonas;
    return subzonas.map(s => '<option value="' + escapeHtml(s) + '">' + escapeHtml(s) + '</option>').join("");
}

function updateAccionesSubzonaSelects() {
    const options = buildSubzonaOptions();
    document.querySelectorAll(".accion-subzona").forEach(sel => {
        sel.innerHTML = options;
    });
}

function renumberAcciones() {
    document.querySelectorAll(".accion-block").forEach((block, i) => {
        block.querySelector(".accion-label").textContent = "Acción " + (i + 1);
    });
}

function validateForm() {
    const auditor = document.getElementById("auditor").value.trim();
    const zona = document.getElementById("zona").value;

    if (!auditor || zona === "") {
        document.getElementById("btnEnviar").disabled = true;
        return;
    }

    const n = ZONAS[parseInt(zona)].subzonas.length;
    let allScored = true;
    for (let i = 1; i <= n; i++) {
        if (document.getElementById("z" + i + "_e").value === "" ||
            document.getElementById("z" + i + "_o").value === "" ||
            document.getElementById("z" + i + "_l").value === "" ||
            document.getElementById("z" + i + "_s").value === "") {
            allScored = false;
            break;
        }
    }

    let accionesOk = true;
    document.querySelectorAll(".accion-block").forEach(block => {
        if (!block.querySelector(".accion-desc").value.trim()) accionesOk = false;
        if (!block.querySelector(".accion-fecha").value) accionesOk = false;
    });

    document.getElementById("btnEnviar").disabled = !(allScored && accionesOk);
}

function buildPayload() {
    const zi = parseInt(document.getElementById("zona").value);
    const z = ZONAS[zi];
    const n = z.subzonas.length;

    const payload = {
        fechaAuditoria: document.getElementById("fecha").value,
        trimestre: document.getElementById("trimestre").value,
        auditor: document.getElementById("auditor").value.trim(),
        zona: z.zona,
        responsableArea: z.responsable,
        empresa: z.empresa,
        numZonas: n
    };

    let totE = 0, totO = 0, totL = 0, totS = 0;
    for (let i = 1; i <= n; i++) {
        const e = parseInt(document.getElementById("z" + i + "_e").value);
        const o = parseInt(document.getElementById("z" + i + "_o").value);
        const l = parseInt(document.getElementById("z" + i + "_l").value);
        const s = parseInt(document.getElementById("z" + i + "_s").value);
        const obs = document.querySelector('.sz-obs[data-idx="' + i + '"]').value.trim();
        payload["z" + i + "_e"] = e;
        payload["z" + i + "_o"] = o;
        payload["z" + i + "_l"] = l;
        payload["z" + i + "_s"] = s;
        payload["z" + i + "_obs"] = obs;
        totE += e; totO += o; totL += l; totS += s;
    }

    payload.subtotalE = totE;
    payload.subtotalO = totO;
    payload.subtotalL = totL;
    payload.subtotalS = totS;
    payload.puntuacionTotal = totE + totO + totL + totS;
    payload.puntuacionMaxima = n * 12;
    payload.porcentaje = Math.round((payload.puntuacionTotal / payload.puntuacionMaxima) * 1000) / 10;
    payload.observaciones = document.getElementById("observaciones").value.trim();

    const acciones = [];
    document.querySelectorAll(".accion-block").forEach(block => {
        acciones.push({
            descripcion: block.querySelector(".accion-desc").value.trim(),
            subzonaAfectada: block.querySelector(".accion-subzona").value,
            sAfectada: block.querySelector(".accion-s").value,
            responsable: block.querySelector(".accion-resp").value.trim(),
            fechaCompromiso: block.querySelector(".accion-fecha").value
        });
    });
    payload.numAcciones = acciones.length;
    payload.acciones = acciones;

    return payload;
}

function handleSubmit(e) {
    e.preventDefault();
    lastPayload = buildPayload();
    sendPayload();
}

async function sendPayload() {
    setState("sending");

    if (CONFIG.endpoint === "[PENDIENTE]") {
        console.log("Payload auditoría:", JSON.stringify(lastPayload, null, 2));
        setTimeout(() => { setState("success"); showSuccessDetails(); }, 1000);
        return;
    }

    try {
        const res = await fetch(CONFIG.endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(lastPayload)
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        setState("success");
        showSuccessDetails();
    } catch (err) {
        console.error("Error enviando auditoría:", err);
        setState("error");
    }
}

function retrySend() { sendPayload(); }

function setState(state) {
    document.getElementById("formView").classList.toggle("hidden", state === "success");
    document.getElementById("sendingView").classList.toggle("hidden", state !== "sending");
    document.getElementById("successView").classList.toggle("hidden", state !== "success");
    document.getElementById("errorView").classList.toggle("hidden", state !== "error");
}

function showSuccessDetails() {
    const p = lastPayload;
    document.getElementById("successDetails").innerHTML =
        "<p><strong>Zona:</strong> " + escapeHtml(p.zona) + "</p>" +
        "<p><strong>Fecha:</strong> " + p.fechaAuditoria + "</p>" +
        "<p><strong>Puntuación:</strong> " + p.puntuacionTotal + "/" + p.puntuacionMaxima + " (" + p.porcentaje + "%)</p>";
}

init();
</script>
</body>
</html>
